version: "3.9"

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: valueinsight-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Your_password123!
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    networks:
      - valueinsight-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Your_password123! -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  backend:
    build:
      context: ./ValueInsight.Backend
      dockerfile: Dockerfile
    container_name: valueinsight-backend
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=ValueInsightDb;User Id=sa;Password=Your_password123!;TrustServerCertificate=True;Encrypt=False
      - OLLAMA_BASE_URL=http://ollama:11434
    networks:
      - valueinsight-net

  frontend:
    build:
      context: ./ValueInsight.Frontend
      dockerfile: Dockerfile
    container_name: valueinsight-frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ApiSettings__BaseUrl=http://backend:8080
    networks:
      - valueinsight-net

  # 🔥 OPCIONAL — solo si usarán Ollama local
  ollama:
    image: ollama/ollama:latest
    container_name: valueinsight-ollama
    ports:
      - "11434:11434"
    networks:
      - valueinsight-net

volumes:
  sqldata:

networks:
  valueinsight-net:
    driver: bridge