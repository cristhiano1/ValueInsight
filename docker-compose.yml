
version: "3.9"

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: valueinsight-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    networks:
      - valueinsight-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$SA_PASSWORD -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  backend:
    build:
      context: ./ValueInsight.Backend
      dockerfile: Dockerfile
    container_name: valueinsight-backend
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION}
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Jwt__ExpireMinutes=${JWT_EXPIRE_MINUTES:-60}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - SeedAdmin__Name=${SEED_ADMIN_NAME}
      - SeedAdmin__Email=${SEED_ADMIN_EMAIL}
      - SeedAdmin__Password=${SEED_ADMIN_PASSWORD}
    networks:
      - valueinsight-net

  frontend:
    build:
      context: ./ValueInsight.Frontend
      dockerfile: Dockerfile
    container_name: valueinsight-frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ApiSettings__BaseUrl=${API_BASE_URL}
    networks:
      - valueinsight-net

  ollama:
    image: ollama/ollama:latest
    container_name: valueinsight-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - valueinsight-net

volumes:
  sqldata:
  ollama_data:

networks:
  valueinsight-net:
    driver: bridge
